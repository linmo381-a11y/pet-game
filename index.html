<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>寵物養成遊戲</title>

  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      background-color: #fff7e8;
    }

    #pet {
      width: 260px;
      cursor: pointer;
      user-select: none;
    }

    #message {
      font-size: 20px;
      margin: 15px;
    }

    .coin {
      position: fixed;
      font-size: 28px;
      animation: fall 1.2s linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(120px);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>我的寵物養成遊戲</h1>

  <p>金幣：<span id="coins">0</span></p>

  <div id="message">摸摸牠看看。</div>

  <img id="pet" src="pet.png" onclick="tapPet(event)">

  <script>
    let coins = 0;

    const messages = [
      "喵！",
      "再摸一下嘛。",
      "今天也要陪我玩嗎？",
      "我餓了。",
      "你來啦。"
    ];

    function tapPet(event) {
      coins += 1;
      document.getElementById("coins").textContent = coins;

      let randomText = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById("message").textContent = randomText;

      let coin = document.createElement("div");
      coin.className = "coin";
      coin.textContent = "🪙";
      coin.style.left = event.clientX + "px";
      coin.style.top = event.clientY + "px";

      document.body.appendChild(coin);

      setTimeout(function() {
        coin.remove();
      }, 1200);
    }
  </script>

</body>
</html>
