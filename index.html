<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>寵物養成遊戲</title>

<style>

body{
    background:#f5eedf;
    font-family:"Microsoft JhengHei";
    text-align:center;
    margin:0;
}

h1{
    margin-top:20px;
}

#game{
    position:relative;
    width:100%;
    height:500px;
    overflow:hidden;
}

#pet{
    position:absolute;
    width:220px;
    left:300px;
    top:180px;
    cursor:grab;
    user-select:none;
}

#message{
    font-size:24px;
    margin:15px;
    min-height:40px;
}

.panel{
    background:white;
    width:500px;
    margin:auto;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

button{
    padding:10px 15px;
    margin:5px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.coin{
    position:fixed;
    font-size:30px;
    animation:fall 1s forwards;
    pointer-events:none;
}

@keyframes fall{

    from{
        opacity:1;
        transform:translateY(0);
    }

    to{
        opacity:0;
        transform:translateY(120px);
    }

}

</style>

</head>

<body>

<h1>我的寵物養成遊戲</h1>

<div class="panel">

<h2>金幣：<span id="coins">0</span></h2>

<p id="message">點我一下試試看。</p>

</div>

<br>

<div id="game">

<img
id="pet"
src="pet.png?v=5"
>

</div>

<div class="panel">

<h2>商店</h2>

<button onclick="buyFood()">🍖 食物 (5)</button>

<button onclick="buyWater()">💧 水 (5)</button>

<button onclick="buyToy()">🧸 玩具 (10)</button>

</div>

<script>

let coins =
Number(localStorage.getItem("coins")) || 0;

document.getElementById("coins").textContent =
coins;

const pet =
document.getElementById("pet");

const message =
document.getElementById("message");

const talks = [

"喵～",

"今天也要陪我玩嗎？",

"我餓了。",

"摸摸我。",

"不要一直戳我啦。",

"你來啦。",

"我想睡覺。"

];

function saveGame(){

localStorage.setItem("coins",coins);

}

function say(text){

message.textContent = text;

}

function randomTalk(){

let text =
talks[Math.floor(Math.random()*talks.length)];

say(text);

}

function dropCoin(x,y){

let coin =
document.createElement("div");

coin.className = "coin";

coin.textContent = "🪙";

coin.style.left = x + "px";

coin.style.top = y + "px";

document.body.appendChild(coin);

setTimeout(function(){

coin.remove();

},1000);

}

pet.addEventListener("click",function(event){

coins++;

document.getElementById("coins").textContent =
coins;

saveGame();

randomTalk();

dropCoin(
event.clientX,
event.clientY
);

});

function buyFood(){

if(coins < 5){

say("金幣不夠。");

return;

}

coins -= 5;

document.getElementById("coins").textContent =
coins;

saveGame();

say("🍖 好吃！");

}

function buyWater(){

if(coins < 5){

say("金幣不夠。");

return;

}

coins -= 5;

document.getElementById("coins").textContent =
coins;

saveGame();

say("💧 喝水真舒服。");

}

function buyToy(){

if(coins < 10){

say("金幣不夠。");

return;

}

coins -= 10;

document.getElementById("coins").textContent =
coins;

saveGame();

say("🧸 我喜歡這個玩具！");

}

let petX = 300;
let petY = 180;

let targetX = 300;
let targetY = 180;

let dragging = false;

let offsetX = 0;
let offsetY = 0;

function movePet(){

if(!dragging){

petX += (targetX-petX)*0.02;

petY += (targetY-petY)*0.02;

pet.style.left = petX+"px";

pet.style.top = petY+"px";

if(
Math.abs(targetX-petX)<5 &&
Math.abs(targetY-petY)<5
){

targetX =
Math.random()*800;

targetY =
Math.random()*300+100;

}

}

requestAnimationFrame(movePet);

}

pet.addEventListener("mousedown",function(event){

dragging = true;

offsetX =
event.clientX - pet.offsetLeft;

offsetY =
event.clientY - pet.offsetTop;

say("你把我抓起來了！");

});

document.addEventListener("mousemove",function(event){

if(!dragging) return;

petX =
event.clientX - offsetX;

petY =
event.clientY - offsetY;

pet.style.left =
petX + "px";

pet.style.top =
petY + "px";

});

document.addEventListener("mouseup",function(){

if(!dragging) return;

dragging = false;

say("放下來了。");

targetX =
Math.random()*800;

targetY =
Math.random()*300+100;

});

movePet();

</script>

</body>
</html>
