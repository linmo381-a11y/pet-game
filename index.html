<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>寵物養成遊戲</title>

<style>
body{
  background:#f5eedf;
  font-family:"Microsoft JhengHei", sans-serif;
  text-align:center;
  margin:0;
}

.panel{
  background:white;
  width:520px;
  max-width:90%;
  margin:15px auto;
  padding:15px;
  border-radius:15px;
}

#game{
  position:relative;
  width:100%;
  height:500px;
  overflow:hidden;
}

#pet{
  position:absolute;
  width:220px;
  left:300px;
  top:180px;
  cursor:grab;
  user-select:none;
}

#message{
  font-size:22px;
  min-height:35px;
}

button{
  padding:10px 15px;
  margin:5px;
  font-size:17px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.coin{
  position:fixed;
  font-size:30px;
  animation:fall 1s forwards;
  pointer-events:none;
}

@keyframes fall{
  from{opacity:1; transform:translateY(0);}
  to{opacity:0; transform:translateY(120px);}
}

.dizzy{
  animation:dizzyMove 0.15s infinite;
  filter:drop-shadow(0 0 10px #9b7cff);
}

@keyframes dizzyMove{
  0%{transform:rotate(-6deg);}
  50%{transform:rotate(6deg);}
  100%{transform:rotate(-6deg);}
}

.dead{
  filter:grayscale(100%);
  opacity:0.55;
}
</style>
</head>

<body>

<h1>我的寵物養成遊戲</h1>

<div class="panel">
  <h2>金幣：<span id="coins">0</span></h2>
  <p>飢餓值 🍖：<span id="hunger">100</span></p>
  <p>口渴值 💧：<span id="thirst">100</span></p>
  <p>好感度 💗：<span id="love">50</span></p>
  <p>玩具 🧸：<span id="toys">0</span></p>
  <p>便便 💩：<span id="poop">0</span></p>
  <p id="message">哎呀，今天也來看我了嗎？</p>
</div>

<div id="game">
  <img id="pet" src="pet.png?v=10">
</div>

<div class="panel">
  <h2>商店 / 互動</h2>
  <button onclick="buyFood()">🍖 買食物 5金幣</button>
  <button onclick="buyWater()">💧 買水 5金幣</button>
  <button onclick="buyToy()">🧸 買玩具 10金幣</button>
  <button onclick="playToy()">跟牠玩</button>
  <button onclick="cleanPoop()">清理便便</button>
  <button onclick="restartGame()">重新開始</button>
</div>

<script>
let coins = Number(localStorage.getItem("coins")) || 0;
let hunger = Number(localStorage.getItem("hunger")) || 100;
let thirst = Number(localStorage.getItem("thirst")) || 100;
let love = Number(localStorage.getItem("love")) || 50;
let toys = Number(localStorage.getItem("toys")) || 0;
let poop = Number(localStorage.getItem("poop")) || 0;
let dead = localStorage.getItem("dead") === "true";

const pet = document.getElementById("pet");
const game = document.getElementById("game");
const message = document.getElementById("message");

const talks = [
  "哎呀，今天也來看我了嗎？真乖。",
  "別急，我在這裡，不會跑太遠的。",
  "嗯？想摸我？可以喔，只准一下。",
  "你這樣一直點，我可是會害羞的。",
  "小心一點，我可不是普通的寵物喔。",
  "今天也辛苦了，過來休息一下吧。"
];

function updateUI(){
  document.getElementById("coins").textContent = coins;
  document.getElementById("hunger").textContent = hunger;
  document.getElementById("thirst").textContent = thirst;
  document.getElementById("love").textContent = love;
  document.getElementById("toys").textContent = toys;
  document.getElementById("poop").textContent = poop;

  if(dead){
    pet.classList.add("dead");
    say("牠已經倒下了……按重新開始吧。");
  }
}

function saveGame(){
  localStorage.setItem("coins", coins);
  localStorage.setItem("hunger", hunger);
  localStorage.setItem("thirst", thirst);
  localStorage.setItem("love", love);
  localStorage.setItem("toys", toys);
  localStorage.setItem("poop", poop);
  localStorage.setItem("dead", dead);
}

function say(text){
  message.textContent = text;
}

function randomTalk(){
  say(talks[Math.floor(Math.random() * talks.length)]);
}

function checkDead(){
  if(hunger <= 0 || thirst <= 0){
    dead = true;
    hunger = Math.max(0, hunger);
    thirst = Math.max(0, thirst);
    pet.classList.add("dead");
    say("飢餓或口渴歸零了……牠倒下了。");
    saveGame();
  }
}

function dropCoin(x,y){
  const coin = document.createElement("div");
  coin.className = "coin";
  coin.textContent = "🪙";
  coin.style.left = x + "px";
  coin.style.top = y + "px";
  document.body.appendChild(coin);
  setTimeout(()=>coin.remove(),1000);
}

pet.addEventListener("click", function(event){
  if(dead) return;
  coins++;
  love++;
  randomTalk();
  dropCoin(event.clientX,event.clientY);
  saveGame();
  updateUI();
});

function buyFood(){
  if(dead) return;
  if(coins < 5){ say("金幣不夠喔。"); return; }

  coins -= 5;
  hunger += 25;

  if(hunger > 100){
    hunger = 100;
    poop++;
    say("吃太多了……嗯，拉了。💩");
  }else{
    say("🍖 呵呵，還挺會照顧人的嘛。");
  }

  saveGame();
  updateUI();
}

function buyWater(){
  if(dead) return;
  if(coins < 5){ say("金幣不夠喔。"); return; }

  coins -= 5;
  thirst += 25;

  if(thirst > 100){
    thirst = 100;
    poop++;
    say("喝太多了……好像有點不妙。💩");
  }else{
    say("💧 謝謝，舒服多了。");
  }

  saveGame();
  updateUI();
}

function buyToy(){
  if(dead) return;
  if(coins < 10){ say("金幣不夠喔。"); return; }

  coins -= 10;
  toys++;
  say("🧸 買到新玩具了。");
  saveGame();
  updateUI();
}

function playToy(){
  if(dead) return;
  if(toys <= 0){ say("沒有玩具喔，先買一個吧。"); return; }

  toys--;
  love += 15;
  hunger -= 5;
  thirst -= 5;
  say("🧸 你是想討我開心嗎？成功了喔。");

  checkDead();
  saveGame();
  updateUI();
}

function cleanPoop(){
  if(dead) return;
  if(poop <= 0){ say("很乾淨，沒有便便。"); return; }

  poop = 0;
  love += 5;
  say("清乾淨了，真貼心。");
  saveGame();
  updateUI();
}

function restartGame(){
  coins = 0;
  hunger = 100;
  thirst = 100;
  love = 50;
  toys = 0;
  poop = 0;
  dead = false;
  pet.classList.remove("dead");
  pet.classList.remove("dizzy");
  say("重新開始了。這次好好照顧我喔。");
  saveGame();
  updateUI();
}

setInterval(function(){
  if(dead) return;

  hunger -= 2;
  thirst -= 3;
  love -= 1;

  if(poop > 0) love -= poop;

  if(love < 0) love = 0;

  checkDead();
  saveGame();
  updateUI();
},5000);

let petX = 300;
let petY = 180;
let targetX = 300;
let targetY = 180;

let dragging = false;
let offsetX = 0;
let offsetY = 0;

let dizzy = 0;
let lastMouseX = 0;

function keepInside(){
  const maxX = game.clientWidth - pet.clientWidth;
  const maxY = game.clientHeight - pet.clientHeight;

  if(petX < 0) petX = 0;
  if(petY < 0) petY = 0;
  if(petX > maxX) petX = maxX;
  if(petY > maxY) petY = maxY;
}

function setNewTarget(){
  const maxX = game.clientWidth - pet.clientWidth;
  const maxY = game.clientHeight - pet.clientHeight;

  targetX = Math.random() * maxX;
  targetY = Math.random() * maxY;
}

function movePet(){
  if(!dragging && !dead){
    petX += (targetX - petX) * 0.02;
    petY += (targetY - petY) * 0.02;

    keepInside();

    pet.style.left = petX + "px";
    pet.style.top = petY + "px";

    if(Math.abs(targetX-petX)<5 && Math.abs(targetY-petY)<5){
      setNewTarget();
    }
  }

  requestAnimationFrame(movePet);
}

pet.addEventListener("mousedown", function(event){
  if(dead) return;

  dragging = true;
  offsetX = event.clientX - pet.offsetLeft;
  offsetY = event.clientY - pet.offsetTop;
  lastMouseX = event.clientX;
  dizzy = 0;

  pet.style.cursor = "grabbing";
  say("被你抓起來了呢，真是大膽。");
});

document.addEventListener("mousemove", function(event){
  if(!dragging || dead) return;

  petX = event.clientX - offsetX;
  petY = event.clientY - offsetY;

  const speed = Math.abs(event.clientX - lastMouseX);
  lastMouseX = event.clientX;
  dizzy += speed * 0.1;

  if(dizzy > 300){
    pet.classList.add("dizzy");
    say("嗚哇……有點暈……🌀");
  }

  keepInside();

  pet.style.left = petX + "px";
  pet.style.top = petY + "px";
});

document.addEventListener("mouseup", function(){
  if(!dragging) return;

  dragging = false;
  pet.style.cursor = "grab";

  if(dizzy > 500){
    love -= 10;
    say("等、等等……我要暈了……🌀");
  }else if(dizzy > 300){
    love -= 5;
    say("有點頭暈呢……");
  }else{
    say("放下來了？還以為你會多抱一會兒。");
  }

  if(love < 0) love = 0;

  setTimeout(function(){
    pet.classList.remove("dizzy");
  },3000);

  dizzy = 0;
  setNewTarget();
  saveGame();
  updateUI();
});

setNewTarget();
updateUI();
movePet();
</script>

</body>
</html>
